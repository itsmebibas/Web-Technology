<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legend tag</title>
  </head>
  <body>
    <div class="lecture">
      <h1>Legend tag:</h1>
      This is use to group/pair tag or element in form in html !! <br />
    </div>
    <div class="practise">
      <fieldset>
        <legend>BIO:</legend>
        Name: <input type="text" placeholder="Bibas Adhikari" />
        <br />Gender:<br /><input
          type="radio"
          name="gender"
          checked
        />Male<br />
        <input type="radio" name="gendr" />Female<br />
      </fieldset>
      <fieldset>
        <legend>Contact:</legend>
        Email: <input type="email" /><br />
        Phone no: <input type="number" /><br />
      </fieldset>
      <fieldset>
        <legend>Hobby:</legend>
        <input type="checkbox" />Sports <input type="checkbox" />Travelling
        <input type="checkbox" />Reading <input type="checkbox" />Photography
      </fieldset>
      <fieldset>
        <legend>Action:</legend>
        <input type="submit" value="NEXT" />
        <input type="reset" value="CLEAR" />
      </fieldset>
    </div>
  </body>
</html>
