<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS AND ITS TYPE</title>
    <style>
      b {
        background-color: red;
        color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="lecture">
      <h1>Css Learning</h1>
      <ol>
        <li style="color: red; background-color: yellow">Inline css</li>
        if we write css within tag using style atributes.
        <li><b>Internal css</b></li>
        using css code inside the head tag using style tag
        <li>External css</li>
        using the different html file and css file with .css extension
        <br />It is used by linking tag called link
        <link rel="contain css file" />
      </ol>
    </div>
  </body>
</html>
