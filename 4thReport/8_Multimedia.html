<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q8 - Multimedia</title>
<style>
  body { padding: 30px; }
  section { margin-bottom: 40px; }
</style>
</head>
<body>

<h1>Multimedia tag in HTML</h1>
<section>
  <h2>1. Audio</h2>
  <audio controls>
    <source src="stealmygirl.mp3" type="audio/mpeg">
  </audio>
</section>


<section>
  <h2>2. Video</h2>
  <video width="400" controls>
    <source src="MorangToKtm.mp4" type="video/mp4">
  </video>
</section>

<section>
  <h2>3. YouTube Video</h2>
  <iframe width="560" height="315"
    src="https://www.youtube.com/embed/w0Xrn5a5b1g?si=LveGEJSDcM9YVbyg"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</section>

<section>
  <h2>4. Map (Google Maps - Kathmandu)</h2>
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d56516.31625953!2d85.28493!3d27.70904!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb198a307baabf%3A0xb5137c1bf18db1ea!2sKathmandu%2C%20Nepal!5e0!3m2!1sen!2sus!4v1"
    width="600" height="400"
    style="border:0;" allowfullscreen="" loading="lazy">
  </iframe>
</section>

</body>
</html>
