<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 fall solution</title>
</head>
<body>
    <form method="POST" enctype="multipart/form-data">
<table border="1">
<tr><th colspan="2">Student Informations</th></tr>
<tr><td>Your Name</td>
<td><input type="text" name="name"></td></tr>
<tr><td>Gender</td>
<td>Male<input type="radio" name="g" value="male">  Female
<input type="radio" name="g" value="female"></td></tr>
<tr><td>Email</td><td><input type="email" name="email"></td></tr>
<tr><td>Address</td><td><input type="text" name="address"></td></tr>
<tr><td>Your pic</td><td><input type="file" name="photo"></td></tr>
<tr><td>Education</td>
<td><select name="edu">
<option>Master Degree</option>
<option>Bachelor Degree</option>
<option>Plus Two</option>
<option>SEE</option>
</select></td></tr>
<tr><td colspan="2">
<input type="submit" value="Register"></td></tr>
</table></form>
</body>
</html>
