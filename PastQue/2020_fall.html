<body>
    <form method="POST">
<h3>Students Data Entry Form</h3>
Student Name: <input type="text" name="sname"><br><br>
Address: <input type="text" name="addr"><br><br>
College: <input type="text" name="college"><br><br>
Email: <input type="email" name="email"><br><br>
Gender: <input type="radio" name="g" value="boy"> Boy
<input type="radio" name="g" value="girl"> Girl
<input type="radio" name="g" value="other"> Other<br><br>
Subjects: <input type="checkbox" name="s" value="PQT"> PQT
<input type="checkbox" name="s" value="WT"> WT
<input type="checkbox" name="s" value="DSA"> DSA
<input type="checkbox" name="s" value="LC">LC
<input type="checkbox" name="s" value="EMTH-III">EMTH-III
<input type="checkbox" name="s" value="EC&I">EC&I<br><br>
City/Town: <select name="city">
<option>Kathmandu</option><option selected>Nuwakot</option>
<option>Pokhara</option><option>Biratnagar</option>
</select><br><br>
Comments:<br><textarea name="comments" rows="4" cols="30"></textarea><br>
<input type="reset" value="Clear"> <input type="submit" value="Submit">
</form>
</body>
