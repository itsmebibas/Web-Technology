<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>
    <h1>Image tag:</h1>
    <h4>
        Attributes:<br>
        alt,height,width,title,src,border
    </h4>
    <div class="basic" >
        <img src="https://static.vecteezy.com/vite/assets/photo-masthead-375-BoK_p8LG.webp" height="100px" width="100px" alt="Image Unavailable">
        <br>
        <a href="https://www.youtube.com" download="yt_logo.png">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/018/930/572/small_2x/youtube-logo-youtube-icon-transparent-free-png.png" alt="Loading" height="50" width="50" >
        </a>
    </div>
    <h2>Image Map:
    </h2>
    This is used to divide same portion of same image to multiple section which allow us to make multiple hyperlink to different sites from same image different section.
    It is mostly done my using online site: imagemap generator.
    <div class="img_map">


            <!-- Image Map Generated by http://www.image-map.net/ -->

        <img src="https://www.shutterstock.com/image-photo/kiev-ukraine-august-29-2019-260nw-1573374430.jpg" usemap="#image-map" >

        <map name="image-map">
            <area target="" alt="Insta" title="Insta" href="https://www.instagram.com" coords="231,33,42,222" shape="rect">
            <area target="" alt="Facebook" title="Facebook" href="https://www.facebook.com" coords="298,230,480,226,483,48,381,44,302,38,313,237,301,49" shape="poly">
            <area target="" alt="Youtube" title="Youtube" href="https://www.youtube.com" coords="651,135,112" shape="circle">
        </map>

    </div>
</body>

</body>
</html>
