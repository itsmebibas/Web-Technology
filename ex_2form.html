<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Learning Example</title>
  </head>
  <body>
    <table border="1px">
      <tr>
        <th>Name:</th>
        <th>Value</th>
      </tr>
      <tr>
        <td>Name:</td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td>Gender:</td>
        <td>
          <input type="radio" name="gender" />Male<br />
          <input type="radio" name="gender" checked />Female
        </td>
      </tr>
      <tr>
        <td>Eye color:</td>
        <td>
          <select name="">
            <option name="">Green</option>
            <option name="">Blue</option>
            <option name="">Red</option>
            <option name="">Cyan</option>
            <option name="">Brown</option>
            <option name="">Black</option>
          </select>
        </td>
        <tr>
            <td>Check all that apply</td>
            <td>
                <input type="checkbox">
            </td>
        </tr>
      </tr>
    </table>
  </body>
</html>
