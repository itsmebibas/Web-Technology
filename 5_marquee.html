<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marquee tag</title>
  </head>
  <body>
    <div class="lecture">
      <h1>Marquee tag::</h1>
      <h3>Attributes:</h3>
      <h5>behavoiur,direction,scrollamount,scrolldelay</h5>
    </div>

    <div class="marquee_tag">
      <marquee behaviour="alternate" direction="left" id="car">
        <img
          src="https://img.magnific.com/free-psd/modern-car-isolated_23-2151504546.jpg?semt=ais_hybrid&w=740&q=80"
        />
      </marquee>
      <!-- Adding of basic js on the file -->
      <input type="button" name="" id="" value="GO" onclick="car.start()" />
      <input type="button" name="" id="" value="STOP" onclick="car.stop()" />
    </div>
  </body>
</html>
